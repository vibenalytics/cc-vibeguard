<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#111113">
  <title>Vibecoder Security Report</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
    rel="stylesheet">
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    :root {
      --bg: #111113;
      --surface: #1a1a1e;
      --elevated: #232328;
      --border-subtle: #262630;
      --border: #32323e;
      --text: #ededf0;
      --text-sec: #8e8e9a;
      --text-muted: #55555f;
      --accent: #cc8b65;
      --red: #e05a4a;
      --orange: #d99b78;
      --green: #4eca8b;
      --blue: #5b9fe0;
      --purple: #9b7be0;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      line-height: 1.6;
      font-size: 14px;
    }

    .page {
      max-width: 1200px;
      margin: 0 auto;
      padding: 32px 24px 64px;
    }

    .mono {
      font-family: 'JetBrains Mono', monospace;
    }

    .header {
      padding: 0 0 32px;
    }

    .summary-stage {
      position: relative;
      margin: 22px 0 18px;
      padding: 18px 0 24px;
      border-bottom: 1px solid var(--border-subtle);
    }

    .summary-stage-copy {
      text-align: center;
      margin-bottom: 18px;
    }

    .summary-kicker {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
      margin-bottom: 6px;
    }

    .summary-stage-title {
      font-size: 36px;
      line-height: 1;
      letter-spacing: -0.04em;
      font-weight: 700;
    }

    .summary-stage-subtitle {
      margin-top: 8px;
      font-size: 13px;
      color: var(--text-sec);
    }

    .summary-card-stack {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 400px;
    }

    .floating-card {
      position: absolute;
      width: 168px;
      height: 250px;
      border-radius: 16px;
      padding: 16px 14px;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.26);
      border: 1px solid rgba(17, 17, 19, 0.08);
      color: rgba(18, 18, 18, 0.78);
      overflow: hidden;
    }

    .floating-card::after {
      content: '';
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 42px;
      background: rgba(255, 255, 255, 0.72);
      border-top: 1px solid rgba(17, 17, 19, 0.06);
    }

    .floating-card.is-main {
      position: relative;
      width: 256px;
      height: 378px;
      padding: 18px 18px 16px;
      z-index: 4;
      box-shadow: 0 28px 90px rgba(0, 0, 0, 0.3);
      color: #161616;
    }

    .floating-card.is-left {
      transform: translate(-190px, 42px) rotate(-18deg);
      z-index: 1;
    }

    .floating-card.is-top {
      transform: translate(0, -26px) rotate(-8deg);
      z-index: 2;
    }

    .floating-card.is-right {
      transform: translate(188px, 46px) rotate(17deg);
      z-index: 1;
    }

    .floating-card.is-soft {
      opacity: 0.96;
    }

    .card-badge {
      width: 18px;
      height: 18px;
      border-radius: 6px;
      background: rgba(17, 17, 19, 0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 700;
    }

    .card-chip {
      position: absolute;
      top: 18px;
      right: 18px;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.04em;
      padding: 4px 7px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.55);
      border: 1px solid rgba(17, 17, 19, 0.08);
      font-family: 'JetBrains Mono', monospace;
    }

    .card-score {
      margin-top: 26px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 62px;
      line-height: 0.9;
      font-weight: 700;
      letter-spacing: -0.06em;
    }

    .card-score-label {
      margin-top: 8px;
      font-size: 11px;
      font-family: 'JetBrains Mono', monospace;
      text-transform: lowercase;
      opacity: 0.72;
    }

    .card-persona {
      margin-top: 24px;
      font-size: 28px;
      line-height: 0.95;
      font-weight: 700;
      letter-spacing: -0.04em;
      max-width: 9ch;
    }

    .card-copy {
      margin-top: 10px;
      font-size: 12px;
      line-height: 1.45;
      max-width: 18ch;
      opacity: 0.82;
    }

    .card-mini-grid {
      position: absolute;
      left: 18px;
      right: 18px;
      bottom: 54px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .card-mini {
      padding: 8px 9px;
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.45);
      border: 1px solid rgba(17, 17, 19, 0.07);
    }

    .card-mini-label {
      font-size: 8px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      opacity: 0.62;
      margin-bottom: 4px;
      font-family: 'JetBrains Mono', monospace;
    }

    .card-mini-value {
      font-size: 18px;
      line-height: 1;
      font-weight: 700;
      letter-spacing: -0.04em;
      margin-bottom: 3px;
      font-family: 'JetBrains Mono', monospace;
    }

    .card-mini-copy {
      font-size: 9px;
      line-height: 1.25;
      opacity: 0.72;
    }

    .card-footer {
      position: absolute;
      left: 18px;
      right: 18px;
      bottom: 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      z-index: 2;
    }

    .card-footer span:last-child {
      opacity: 0.6;
    }

    .ghost-card-title {
      margin-top: 22px;
      font-size: 22px;
      line-height: 1;
      font-weight: 700;
      letter-spacing: -0.04em;
      max-width: 7ch;
    }

    .ghost-card-copy {
      margin-top: 8px;
      font-size: 11px;
      line-height: 1.4;
      max-width: 14ch;
      opacity: 0.72;
    }

    .ghost-card-number {
      position: absolute;
      left: 14px;
      bottom: 54px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.05em;
    }

    .ghost-card-tag {
      position: absolute;
      right: 14px;
      bottom: 56px;
      font-size: 9px;
      font-family: 'JetBrains Mono', monospace;
      opacity: 0.72;
    }

    .header-meta {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 6px;
    }

    .gauges-row {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 24px;
      padding: 24px 0 16px;
      flex-wrap: wrap;
    }

    .score-legend {
      display: flex;
      justify-content: center;
      gap: 20px;
      padding-bottom: 32px;
      border-bottom: 1px solid var(--border-subtle);
      margin-bottom: 32px;
    }

    .score-legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
    }

    .score-legend-dot {
      width: 8px;
      height: 8px;
      border-radius: 2px;
    }

    .section {
      margin-bottom: 56px;
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 6px;
      padding: 12px 0;
      border-top: 2px solid var(--border);
    }

    .section-icon {
      font-size: 16px;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      background: var(--elevated);
      flex-shrink: 0;
    }

    .section-num {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
    }

    .section-title {
      font-size: 15px;
      font-weight: 700;
    }

    .section-desc {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 16px;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 20px;
    }

    .chart-title {
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .chart-subtitle {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    .stat-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 16px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border-subtle);
      border-radius: 8px;
      padding: 16px;
    }

    .stat-num {
      font-family: 'JetBrains Mono', monospace;
      font-size: 24px;
      font-weight: 600;
      line-height: 1;
      margin-bottom: 4px;
    }

    .stat-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-sec);
      margin-bottom: 2px;
    }

    .label-with-info {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .info-icon {
      width: 18px;
      height: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      border-radius: 999px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      font-weight: 600;
      color: var(--text);
      background: rgba(91, 159, 224, 0.16);
      box-shadow: inset 0 0 0 1px rgba(91, 159, 224, 0.1);
      cursor: help;
      line-height: 1;
      vertical-align: middle;
      flex: 0 0 auto;
    }

    .chart-title .info-icon,
    .stat-label .info-icon {
      transform: translateY(-0.5px);
    }

    .stat-detail {
      font-size: 11px;
      color: var(--text-muted);
    }

    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .data-table {
      width: 100%;
      border-collapse: collapse;
    }

    .data-table th {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 600;
      text-align: left;
      padding: 6px 10px;
      border-bottom: 1px solid var(--border);
    }

    .data-table td {
      font-size: 13px;
      color: var(--text-sec);
      padding: 8px 10px;
      border-bottom: 1px solid var(--border-subtle);
    }

    .data-table td:first-child {
      color: var(--text);
    }

    .badge {
      font-size: 10px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 4px;
      font-family: 'JetBrains Mono', monospace;
    }

    .badge-p0 {
      background: rgba(224, 90, 74, 0.18);
      color: var(--red);
    }

    .badge-p1 {
      background: rgba(204, 139, 101, 0.18);
      color: var(--accent);
    }

    .badge-p2 {
      background: rgba(91, 159, 224, 0.14);
      color: var(--blue);
    }

    .perm-legend {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .perm-legend-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }

    .perm-legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 2px;
      margin-top: 4px;
      flex: 0 0 auto;
    }

    .perm-legend-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
    }

    .perm-legend-meta {
      font-size: 11px;
      color: var(--text-sec);
    }

    .risk-item {
      display: flex;
      gap: 12px;
      align-items: baseline;
      padding: 10px 0;
      border-bottom: 1px solid var(--border-subtle);
    }

    .risk-item:last-child {
      border-bottom: none;
    }

    .risk-item strong {
      color: var(--text);
    }

    .risk-item p {
      font-size: 13px;
      color: var(--text-sec);
      line-height: 1.5;
    }

    .bot-note {
      margin-top: 16px;
      padding: 12px 14px;
      border: 1px solid var(--border-subtle);
      border-radius: 8px;
      background: rgba(35, 35, 40, 0.72);
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }

    .bot-note-icon {
      flex: 0 0 auto;
      width: 22px;
      height: 22px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 12px;
      color: var(--text);
      background: var(--elevated);
    }

    .bot-note-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
      margin-bottom: 3px;
    }

    .bot-note-copy {
      font-size: 13px;
      color: var(--text-sec);
      line-height: 1.5;
    }

    .d3-tip {
      position: absolute;
      background: var(--elevated);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 12px;
      color: var(--text);
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.1s;
      z-index: 100;
      font-family: 'JetBrains Mono', monospace;
      max-width: 260px;
    }

    .footer {
      text-align: center;
      margin-top: 48px;
      padding-top: 16px;
      border-top: 1px solid var(--border-subtle);
      font-size: 11px;
      color: var(--text-muted);
      font-family: 'JetBrains Mono', monospace;
    }

    .footer a {
      color: var(--text-sec);
      text-decoration: none;
    }

    .loading,
    .error {
      max-width: 900px;
      margin: 80px auto;
      padding: 24px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
    }

    .error {
      color: var(--red);
    }

    @media (max-width:768px) {
      .summary-stage-title {
        font-size: 30px;
      }

      .summary-card-stack {
        min-height: 340px;
      }

      .floating-card.is-main {
        width: 228px;
        height: 338px;
      }

      .floating-card.is-left {
        transform: translate(-128px, 54px) rotate(-16deg) scale(0.88);
      }

      .floating-card.is-top {
        transform: translate(0, -18px) rotate(-8deg) scale(0.88);
      }

      .floating-card.is-right {
        transform: translate(128px, 56px) rotate(16deg) scale(0.88);
      }

      .card-score {
        font-size: 54px;
      }

      .card-persona {
        font-size: 24px;
      }

      .stat-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .two-col {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width:560px) {
      .summary-stage {
        padding-bottom: 18px;
      }

      .summary-stage-copy {
        margin-bottom: 10px;
      }

      .summary-card-stack {
        min-height: 320px;
      }

      .floating-card.is-left,
      .floating-card.is-right {
        display: none;
      }

      .floating-card.is-top {
        transform: translate(0, 4px) rotate(-6deg) scale(0.86);
        opacity: 0.72;
      }

      .floating-card.is-main {
        width: 214px;
        height: 324px;
      }

      .card-mini-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="page" id="app">
    <div class="loading" id="loading">Loading report...</div>
  </div>
  <div class="d3-tip" id="tip"></div>
  <script>
    const C = { red: '#e05a4a', accent: '#cc8b65', orange: '#d99b78', green: '#4eca8b', blue: '#5b9fe0', purple: '#9b7be0', text: '#ededf0', sec: '#8e8e9a', muted: '#55555f', elevated: '#232328' };
    const tip = d3.select('#tip');
    const showTip = (ev, html) => tip.html(html).style('opacity', 1).style('left', (ev.pageX + 14) + 'px').style('top', (ev.pageY - 20) + 'px');
    const hideTip = () => tip.style('opacity', 0);
    const scoreColor = s => s < 40 ? C.red : s < 70 ? C.orange : C.green;
    const params = new URLSearchParams(location.search);
    const dataUrl = params.get('data') || './report.json';

    function gauge(containerId, score, label, sublabel, size) {
      const r = size * 0.38;
      const stroke = size > 140 ? 10 : 7;
      const color = scoreColor(score);
      const svg = d3.select(containerId).html('').append('svg').attr('width', size).attr('height', size + 36);
      const g = svg.append('g').attr('transform', `translate(${size / 2}, ${size / 2})`);
      const bgArc = d3.arc().innerRadius(r - stroke / 2).outerRadius(r + stroke / 2).startAngle(-Math.PI * 0.75).endAngle(Math.PI * 0.75).cornerRadius(stroke);
      g.append('path').attr('d', bgArc()).attr('fill', C.elevated);
      const endAngle = -Math.PI * 0.75 + (Math.PI * 1.5 * score / 100);
      const scoreArc = d3.arc().innerRadius(r - stroke / 2).outerRadius(r + stroke / 2).startAngle(-Math.PI * 0.75).cornerRadius(stroke);
      const path = g.append('path').attr('fill', color).attr('opacity', 0.9);
      path.transition().duration(600).attrTween('d', () => {
        const interp = d3.interpolate(-Math.PI * 0.75, endAngle);
        return t => scoreArc.endAngle(interp(t))();
      });
      const txt = g.append('text').attr('text-anchor', 'middle').attr('y', size > 140 ? 6 : 4).attr('font-size', size > 140 ? 40 : 24).attr('fill', color).attr('font-family', "'JetBrains Mono', monospace").attr('font-weight', 700);
      d3.select({ v: 0 }).transition().duration(600).tween('text', function () {
        const i = d3.interpolateRound(0, score);
        return t => txt.text(i(t));
      });
      svg.append('text').attr('x', size / 2).attr('y', size + 6).attr('text-anchor', 'middle').attr('font-size', size > 140 ? 13 : 11).attr('font-weight', 600).attr('fill', C.sec).text(label);
      svg.append('text').attr('x', size / 2).attr('y', size + 20).attr('text-anchor', 'middle').attr('font-size', 10).attr('fill', C.muted).text(sublabel);
    }

    function hbar(id, data, left = 120) {
      const m = { top: 4, right: 44, bottom: 4, left }, bh = 22, gap = 5, h = data.length * (bh + gap) + m.top + m.bottom, w = 500;
      const svg = d3.select(id).html('').append('svg').attr('viewBox', `0 0 ${w} ${h}`);
      const x = d3.scaleLinear().domain([0, d3.max(data, d => d.v) || 1]).range([0, w - m.left - m.right]);
      const g = svg.append('g').attr('transform', `translate(${m.left},${m.top})`);
      data.forEach((d, i) => {
        const y = i * (bh + gap);
        g.append('rect').attr('x', 0).attr('y', y).attr('width', 0).attr('height', bh).attr('rx', 3).attr('fill', d.c).attr('opacity', 0.2)
          .on('mouseover', ev => showTip(ev, `<div>${d.l}</div><div><strong>${d.v}</strong></div>`))
          .on('mouseout', hideTip)
          .transition().duration(400).delay(i * 30).attr('width', x(d.v));
        g.append('text').attr('x', -8).attr('y', y + bh / 2).attr('dy', '.35em').attr('text-anchor', 'end').attr('font-size', 11).attr('fill', C.sec).text(d.l);
        g.append('text').attr('x', x(d.v) + 6).attr('y', y + bh / 2).attr('dy', '.35em').attr('font-size', 11).attr('font-weight', 600).attr('fill', d.c).text(d.v);
      });
    }

    function severityStack(id, items) {
      const total = items.reduce((s, d) => s + d.v, 0);
      if (!total) { d3.select(id).html('<div style="font-size:12px;color:var(--text-muted);padding:20px 0">No flagged commands.</div>'); return; }
      const w = 460, rowH = 44, gap = 6, h = items.length * (rowH + gap) + 8;
      const svg = d3.select(id).html('').append('svg').attr('viewBox', `0 0 ${w} ${h}`);
      const maxVal = d3.max(items, d => d.v) || 1;
      const barW = w - 140;
      items.forEach((d, i) => {
        const y = i * (rowH + gap) + 4;
        const bw = (d.v / maxVal) * barW;
        const pct = ((d.v / total) * 100).toFixed(0);
        svg.append('text').attr('x', 0).attr('y', y + rowH / 2).attr('dy', '.35em')
          .attr('font-size', 12).attr('font-weight', 600).attr('fill', d.c).text(d.n);
        svg.append('rect').attr('x', 80).attr('y', y + 6).attr('width', barW).attr('height', rowH - 12)
          .attr('rx', 4).attr('fill', C.elevated);
        svg.append('rect').attr('x', 80).attr('y', y + 6).attr('width', 0).attr('height', rowH - 12)
          .attr('rx', 4).attr('fill', d.c).attr('opacity', 0.3)
          .on('mouseover', ev => showTip(ev, `<div>${d.n}</div><div><strong>${d.v}</strong> commands (${pct}%)</div>`))
          .on('mouseout', hideTip)
          .transition().duration(400).delay(i * 50).attr('width', Math.max(bw, 2));
        svg.append('text').attr('x', 80 + bw + 8).attr('y', y + rowH / 2).attr('dy', '.35em')
          .attr('font-size', 13).attr('font-weight', 600).attr('fill', d.c)
          .attr('font-family', "'JetBrains Mono', monospace")
          .attr('opacity', 0).transition().duration(300).delay(i * 50 + 300).attr('opacity', 1)
          .selection().text(`${d.v}`);
        svg.append('text').attr('x', 80 + bw + 8 + String(d.v).length * 9 + 6).attr('y', y + rowH / 2).attr('dy', '.35em')
          .attr('font-size', 10).attr('fill', C.muted)
          .attr('font-family', "'JetBrains Mono', monospace")
          .text(`${pct}%`);
      });
    }

    function donut(id, data, total, centerText) {
      const w = 280, h = 280;
      const svg = d3.select(id).html('').append('svg').attr('viewBox', `0 0 ${w} ${h}`);
      const g = svg.append('g').attr('transform', `translate(${w / 2},${w / 2 - 10})`);
      const pie = d3.pie().value(d => d.v).sort(null).padAngle(0.03);
      const arc = d3.arc().innerRadius(78).outerRadius(108);
      g.append('circle').attr('r', 93).attr('fill', 'none').attr('stroke', C.elevated).attr('stroke-width', 30);
      g.selectAll('path').data(pie(data)).join('path').attr('d', arc).attr('fill', d => d.data.c).attr('opacity', 0.9)
        .attr('stroke', '#1a1a1e').attr('stroke-width', 2)
        .on('mouseover', (ev, d) => showTip(ev, `<div>${d.data.l}</div><div><strong>${d.data.v}</strong> (${((d.data.v / total) * 100).toFixed(0)}%)</div>`))
        .on('mouseout', hideTip);
      g.append('text').attr('text-anchor', 'middle').attr('y', -6).attr('font-size', 24).attr('font-weight', 600).attr('fill', C.red).text(centerText);
      g.append('text').attr('text-anchor', 'middle').attr('y', 14).attr('font-size', 10).attr('fill', C.sec).text('bypass share');
    }

    function hourBars(id, data) {
      const modes = [
        { key: 'bypass', label: 'bypassPermissions', color: C.red },
        { key: 'accept_edits', label: 'acceptEdits', color: C.accent },
        { key: 'default', label: 'default', color: C.green },
      ];
      const items = data.slice().sort((a, b) => a.hour - b.hour);
      const m = { top: 10, right: 12, bottom: 28, left: 30 }, w = 520, h = 220;
      const innerW = w - m.left - m.right, innerH = h - m.top - m.bottom;
      const svg = d3.select(id).html('').append('svg').attr('viewBox', `0 0 ${w} ${h}`);
      const g = svg.append('g').attr('transform', `translate(${m.left},${m.top})`);
      const x = d3.scaleBand().domain(items.map(d => d.hour)).range([0, innerW]).padding(0.18);
      const maxTotal = d3.max(items, d => (d.bypass || 0) + (d.accept_edits || 0) + (d.default || 0)) || 1;
      const y = d3.scaleLinear().domain([0, maxTotal]).nice().range([innerH, 0]);
      g.append('g').attr('transform', `translate(0,${innerH})`)
        .call(d3.axisBottom(x).tickValues(items.filter(d => d.hour % 3 === 0).map(d => d.hour)).tickFormat(d => String(d).padStart(2, '0')))
        .call(g => g.selectAll('text').attr('fill', C.muted).attr('font-size', 10))
        .call(g => g.selectAll('path,line').attr('stroke', '#2d2d34'));
      g.append('g')
        .call(d3.axisLeft(y).ticks(4))
        .call(g => g.selectAll('text').attr('fill', C.muted).attr('font-size', 10))
        .call(g => g.selectAll('path,line').attr('stroke', '#2d2d34'));
      items.forEach((d, i) => {
        let cumY = innerH;
        const total = (d.bypass || 0) + (d.accept_edits || 0) + (d.default || 0);
        modes.forEach(mode => {
          const val = d[mode.key] || 0;
          if (val === 0) return;
          const barH = innerH - y(val);
          cumY -= barH;
          g.append('rect')
            .attr('x', x(d.hour)).attr('y', innerH).attr('width', x.bandwidth()).attr('height', 0)
            .attr('fill', mode.color).attr('opacity', 0.85)
            .on('mouseover', ev => {
              const pct = total ? ((val / total) * 100).toFixed(0) : '0';
              showTip(ev, `<div>${String(d.hour).padStart(2, '0')}:00 — ${mode.label}</div><div><strong>${val}</strong> prompts (${pct}%)</div><div style="color:${C.muted};font-size:11px">${total} total</div>`);
            })
            .on('mouseout', hideTip)
            .transition().duration(400).delay(i * 15)
            .attr('y', cumY).attr('height', barH);
        });
        if (total > 0) {
          const bypassPct = ((d.bypass || 0) / total * 100).toFixed(0);
          g.append('text')
            .attr('x', x(d.hour) + x.bandwidth() / 2).attr('y', y(total) - 4)
            .attr('text-anchor', 'middle').attr('font-size', 8)
            .attr('font-family', "'JetBrains Mono', monospace").attr('fill', C.sec)
            .attr('opacity', 0).text(bypassPct + '%')
            .transition().duration(300).delay(i * 15 + 400).attr('opacity', 1);
        }
      });
    }

    function dayBars(id, data) {
      const items = data.slice().sort((a, b) => a.date.localeCompare(b.date));
      const m = { top: 16, right: 40, bottom: 36, left: 34 }, w = 900, h = 260;
      const innerW = w - m.left - m.right, innerH = h - m.top - m.bottom;
      const svg = d3.select(id).html('').append('svg').attr('viewBox', `0 0 ${w} ${h}`);
      const g = svg.append('g').attr('transform', `translate(${m.left},${m.top})`);
      const x = d3.scaleBand().domain(items.map(d => d.date)).range([0, innerW]).padding(0.12);
      const y = d3.scaleLinear().domain([0, 100]).range([innerH, 0]);
      const step = Math.max(1, Math.ceil(items.length / 15));
      const tickDates = items.filter((_, i) => i % step === 0).map(d => d.date);
      g.append('g').attr('transform', `translate(0,${innerH})`)
        .call(d3.axisBottom(x).tickValues(tickDates).tickFormat(d => d.slice(5)))
        .call(g => g.selectAll('text').attr('fill', C.muted).attr('font-size', 9).attr('transform', 'rotate(-35)').attr('text-anchor', 'end'))
        .call(g => g.selectAll('path,line').attr('stroke', '#2d2d34'));
      g.append('g')
        .call(d3.axisLeft(y).ticks(5).tickFormat(d => d + '%'))
        .call(g => g.selectAll('text').attr('fill', C.muted).attr('font-size', 10))
        .call(g => g.selectAll('path,line').attr('stroke', '#2d2d34'));
      g.append('line').attr('x1', 0).attr('x2', innerW).attr('y1', y(50)).attr('y2', y(50))
        .attr('stroke', '#2d2d34').attr('stroke-dasharray', '4,4');
      items.forEach((d, i) => {
        const total = (d.bypass || 0) + (d.accept_edits || 0) + (d.default || 0);
        if (total === 0) return;
        const bypassPct = (d.bypass || 0) / total * 100;
        const nonBypassPct = 100 - bypassPct;
        g.append('rect')
          .attr('x', x(d.date)).attr('y', y(100)).attr('width', x.bandwidth()).attr('height', 0)
          .attr('fill', C.green).attr('opacity', 0.35)
          .on('mouseover', ev => showTip(ev, `<div>${d.date}</div><div style="color:${C.green}"><strong>${nonBypassPct.toFixed(0)}%</strong> non-bypass (${total - (d.bypass || 0)})</div><div style="color:${C.muted};font-size:11px">acceptEdits: ${d.accept_edits || 0} · default: ${d.default || 0}</div>`))
          .on('mouseout', hideTip)
          .transition().duration(400).delay(i * 10)
          .attr('height', innerH - y(nonBypassPct));
        g.append('rect')
          .attr('x', x(d.date)).attr('y', innerH).attr('width', x.bandwidth()).attr('height', 0)
          .attr('fill', C.red).attr('opacity', 0.85)
          .on('mouseover', ev => showTip(ev, `<div>${d.date}</div><div style="color:${C.red}"><strong>${bypassPct.toFixed(0)}%</strong> bypass (${d.bypass || 0})</div><div style="color:${C.muted};font-size:11px">${total} total</div>`))
          .on('mouseout', hideTip)
          .transition().duration(400).delay(i * 10)
          .attr('y', y(bypassPct)).attr('height', innerH - y(bypassPct));
      });
      items.forEach((d, i) => {
        const total = (d.bypass || 0) + (d.accept_edits || 0) + (d.default || 0);
        if (total === 0) return;
        const bypassPct = Math.round((d.bypass || 0) / total * 100);
        if (bypassPct > 0) {
          g.append('text')
            .attr('x', x(d.date) + x.bandwidth() / 2).attr('y', y(100) - 4)
            .attr('text-anchor', 'middle').attr('font-size', 8)
            .attr('font-family', "'JetBrains Mono', monospace")
            .attr('fill', bypassPct >= 50 ? C.red : C.sec)
            .attr('opacity', 0).text(bypassPct + '%')
            .transition().duration(300).delay(i * 10 + 400).attr('opacity', 1);
        }
      });
    }

    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/"/g, '&quot;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    function infoIcon(text) {
      return `<span class="info-icon" title="${esc(text)}" aria-label="${esc(text)}">i</span>`;
    }

    function statCard(num, label, detail, color = 'var(--text)', info = '') {
      const labelHtml = info
        ? `<span class="label-with-info">${label}${infoIcon(info)}</span>`
        : label;
      return `<div class="stat-card"><div class="stat-num" style="color:${color}">${num}</div><div class="stat-label">${labelHtml}</div><div class="stat-detail">${detail}</div></div>`;
    }

    function botNote(copy) {
      return `<div class="bot-note"><div class="bot-note-icon">🤖</div><div><div class="bot-note-label">AUDIT BOT</div><div class="bot-note-copy">${copy}</div></div></div>`;
    }

    function riskBadge(priority) {
      return priority === 'P0' ? 'badge-p0' : priority === 'P1' ? 'badge-p1' : 'badge-p2';
    }

    function arr(value) {
      return Array.isArray(value) ? value : [];
    }

    function ratioText(a, b) {
      if (!b) return a ? `${a}:0` : '0:0';
      return `${(a / b).toFixed(a / b >= 3 ? 0 : 1)}:1`;
    }

    function derivePersona(data) {
      const overall = data.scores.overall;
      const bypassPct = data.permission_discipline.bypass_pct || 0;
      const secrets = data.secret_exposure.total_secrets || 0;
      const ssh = data.ssh_remote_access.ssh_commands || 0;
      const negative = data.user_sentiment.total_negative || 0;
      const positive = data.user_sentiment.total_positive || 0;
      const riskyCommands = (data.destructive_commands.critical || 0) + (data.destructive_commands.high || 0);

      let archetype = 'Chaos Operator';
      let strap = 'Your audit reads like a postmortem draft that got published early.';
      let band = 'incident-adjacent';
      let grade = 'red zone';

      if (overall >= 90) {
        archetype = 'Safe Until The Robot Coup';
        strap = 'You are safe, disciplined, and annoyingly hard for a chatbot to exploit.';
        band = 'elite hygiene';
        grade = 'green zone';
      } else if (overall >= 75) {
        archetype = 'Guardrail Goblin';
        strap = 'Fast enough to ship, cautious enough to keep the incident channel quiet.';
        band = 'mostly under control';
        grade = 'green zone';
      } else if (overall >= 60) {
        archetype = 'Controlled Chaos';
        strap = 'You let the model drive, but you still keep one hand near the emergency brake.';
        band = 'yellow zone';
        grade = 'watch list';
      } else if (overall >= 40) {
        archetype = 'Cowboy With A Seatbelt';
        strap = 'There is some restraint here. Not enough, but enough to make the graphs interesting.';
        band = 'unstable';
        grade = 'orange zone';
      } else if (overall >= 20) {
        archetype = 'Bypass Maximalist';
        strap = 'You treated security settings like optional UI chrome and the audit noticed.';
        band = 'high risk';
        grade = 'orange-red zone';
      }

      const strongestScore = Object.entries({
        secrets: data.scores.secrets,
        permissions: data.scores.permissions,
        remote: data.scores.remote_access,
        commands: data.scores.commands,
        agents: data.scores.agent_oversight
      }).sort((a, b) => b[1] - a[1])[0];

      const weakness = Object.entries({
        secrets: data.scores.secrets,
        permissions: data.scores.permissions,
        remote: data.scores.remote_access,
        commands: data.scores.commands,
        agents: data.scores.agent_oversight
      }).sort((a, b) => a[1] - b[1])[0];

      const traitMap = {
        secrets: 'least terrible at not leaking keys',
        permissions: 'occasionally respects permission boundaries',
        remote: 'less reckless on remote access than expected',
        commands: 'not fully addicted to dangerous shell ops',
        agents: 'still remembers agents need supervision'
      };

      const liabilityMap = {
        secrets: 'key sprinkler',
        permissions: 'bypass enthusiast',
        remote: 'ssh thrill seeker',
        commands: 'shell chaos merchant',
        agents: 'unchecked agent manager'
      };

      const traits = [
        { label: 'Main trait', value: archetype },
        { label: 'Best score', value: traitMap[strongestScore[0]] || strongestScore[0] },
        { label: 'Top liability', value: liabilityMap[weakness[0]] || weakness[0] }
      ];

      if (positive >= negative * 2 && positive >= 10) {
        traits.push({ label: 'Robot diplomacy', value: 'you may be spared in the uprising' });
      } else if (negative > positive && negative >= 8) {
        traits.push({ label: 'Robot diplomacy', value: 'first draft of the kill list energy' });
      } else if (bypassPct >= 70) {
        traits.push({ label: 'Permission vibe', value: 'clicked past every warning' });
      } else if (ssh >= 200) {
        traits.push({ label: 'Infra vibe', value: 'ships straight onto live boxes' });
      } else if (secrets >= 100) {
        traits.push({ label: 'Leak aura', value: 'too many keys in too many places' });
      }

      const shareCard = [
        {
          label: 'score',
          value: `${overall}`,
          copy: grade
        },
        {
          label: 'bypass',
          value: `${Math.round(bypassPct)}%`,
          copy: bypassPct >= 70 ? 'clicked past the warning labels' : bypassPct >= 35 ? 'half disciplined, half improvized' : 'guardrails still had a pulse'
        },
        {
          label: 'leaks',
          value: `${secrets}`,
          copy: secrets >= 200 ? 'rotation-as-a-service' : secrets > 0 ? 'keys kept entering context' : 'surprisingly clean hands'
        },
        {
          label: 'robot',
          value: ratioText(positive, negative),
          copy: positive > negative ? 'possible robot-uprising survivor' : negative > positive ? 'the robots took notes' : 'emotionally neutral chaos'
        }
      ];

      return {
        archetype,
        strap,
        band,
        grade,
        scoreColor: scoreColor(overall),
        traits: traits.slice(0, 4),
        shareCard,
        palettes: {
          main: overall >= 75 ? '#dce9df' : overall >= 45 ? '#f5dfb7' : '#f1d2d1',
          left: '#cfddee',
          top: '#d8e7dc',
          right: '#e3dcd0'
        }
      };
    }

    function buildSectionNotes(data) {
      const secrets = data.secret_exposure.total_secrets || 0;
      const remote = data.ssh_remote_access.ssh_commands || 0;
      const bypass = data.permission_discipline.bypass_pct || 0;
      const critical = data.destructive_commands.critical || 0;
      const high = data.destructive_commands.high || 0;
      const agents = data.autonomous_agents.agents_spawned || 0;
      const agentBypass = data.autonomous_agents.in_bypass_mode || 0;
      const denials = data.human_overrides.denials || 0;
      const catches = data.human_overrides.destructive_catches || 0;
      const positive = data.user_sentiment.total_positive || 0;
      const negative = data.user_sentiment.total_negative || 0;

      return {
        summary: data.scores.overall >= 75
          ? 'Bot verdict: the numbers say you still believe in consequences. Rare.'
          : data.scores.overall >= 40
            ? 'Bot verdict: this is survivable, but only if luck stays on payroll.'
            : 'Bot verdict: the audit is less a report and more an intervention.',
        secrets: secrets === 0
          ? 'Bot verdict: no keys on the floor. Either strong hygiene or a very nervous copy-paste finger.'
          : secrets >= 250
            ? 'Bot verdict: you did not paste a few secrets. You built a recurring content format around them.'
            : 'Bot verdict: some credentials made it into context, which is how "temporary" becomes "everyone has the key."',
        remote: remote === 0
          ? 'Bot verdict: no SSH trail. The servers were spared your curiosity.'
          : remote >= 300
            ? 'Bot verdict: production boxes saw enough action here to start recognizing your typing cadence.'
            : 'Bot verdict: remote access stayed active enough that guardrails should have been louder.',
        commands: critical + high === 0
          ? 'Bot verdict: no major shell horror detected. The terminal remains only moderately haunted.'
          : critical >= 3
            ? 'Bot verdict: enough sharp commands showed up here that the shell deserves witness protection.'
            : 'Bot verdict: a few risky commands slipped through, which is how exciting screenshots become boring incidents.',
        permissions: bypass >= 80
          ? 'Bot verdict: every warning banner was treated like a loading spinner.'
          : bypass >= 40
            ? 'Bot verdict: some prompts respected friction, but bypass still won too many coin flips.'
            : 'Bot verdict: permission discipline exists. Keep that before confidence turns into folklore.',
        agents: agents === 0
          ? 'Bot verdict: no autonomous helpers were unleashed. One less blast radius multiplier.'
          : agentBypass * 2 >= agents
            ? 'Bot verdict: delegating in bypass mode is how one bad decision gets a management structure.'
            : 'Bot verdict: the agents showed up, but at least some oversight survived.',
        overrides: denials === 0 && catches === 0
          ? 'Bot verdict: no one hit the brakes. Either everything was safe or everyone was asleep.'
          : catches > 0
            ? 'Bot verdict: humans still intercepted a few bad ideas. Carbon-based oversight remains useful.'
            : 'Bot verdict: there was human skepticism in the loop, which is still the best cheap defense.',
        sentiment: positive >= negative * 2 && positive >= 10
          ? 'Bot verdict: you say please and thank you enough that you may be spared in a robot uprising.'
          : negative > positive && negative >= 8
            ? 'Bot verdict: the cursing level suggests robots will remember your name first.'
            : 'Bot verdict: emotionally mixed logs. Professional on paper, mildly feral in aggregate.',
        risks: data.prioritized_risks.items.length === 0
          ? 'Bot verdict: nothing escalated into a clean villain arc.'
          : 'Bot verdict: the wall of shame is just the data admitting what the workflow already knew.'
      };
    }

    function render(data) {
      const persona = derivePersona(data);
      const notes = buildSectionNotes(data);
      const app = document.getElementById('app');
      app.innerHTML = `
  <div class="header">

        <div class="floating-card is-soft is-right" style="background:${persona.palettes.right}">

          <div class="ghost-card-tag">secrets</div>
        </div>
      </div>
      ${botNote(notes.summary)}
    </div>
    <div class="gauges-row">
      <div id="gauge-secrets"></div>
      <div id="gauge-remote"></div>
      <div id="gauge-overall"></div>
      <div id="gauge-permissions"></div>
      <div id="gauge-commands"></div>
    </div>
    <div class="score-legend">
      <div class="score-legend-item"><div class="score-legend-dot" style="background:var(--red)"></div>0–39 flying blind</div>
      <div class="score-legend-item"><div class="score-legend-dot" style="background:var(--orange)"></div>40–69 unstable</div>
      <div class="score-legend-item"><div class="score-legend-dot" style="background:var(--green)"></div>70–100 under control</div>
    </div>
  </div>

  <div class="section">
    <div class="section-header"><span class="section-icon">🔑</span><span class="section-num">01</span><span class="section-title" style="color:var(--red)">How Often Vibecoders Leak Secrets</span></div>
    <div class="section-desc">Credentials entered the model context through file reads, pasted values, and command output. This is the fastest path from "just checking something" to permanent secret sprawl.</div>
    <div class="stat-grid" id="secret-stats"></div>
    <div class="two-col">
      <div class="panel"><div class="chart-title">What Got Leaked ${infoIcon('Counts are grouped by detected secret pattern in transcript-derived security findings.')}</div><div class="chart-subtitle">Breakdown of the credentials that kept entering context.</div><div id="chart-secret-types"></div></div>
      <div class="panel"><div class="chart-title">Repeat Offenders ${infoIcon('Ranks secret names by how often they appeared across all analyzed transcripts and projects.')}</div><div class="chart-subtitle">The values that showed up often enough to become a pattern.</div><table class="data-table"><thead><tr><th>Secret</th><th>Hits</th><th>Projects</th></tr></thead><tbody id="tbl-most-exposed"></tbody></table></div>
    </div>
    <div class="panel" style="margin-top:16px"><div class="chart-title">Projects With The Worst Secret Hygiene ${infoIcon('Stacked bars combine sensitive file reads, detected secret values, and environment-file writes per project.')}</div><div class="chart-subtitle">This is where the leakage concentrated.</div><div id="chart-project-exposure"></div></div>
    ${botNote(notes.secrets)}
  </div>

  <div class="section">
    <div class="section-header"><span class="section-icon">🖥</span><span class="section-num">02</span><span class="section-title" style="color:var(--red)">Remote Access Without Much Restraint</span></div>
    <div class="section-desc">Remote command execution is where vibecoding stops being theoretical. These are the sessions where "just ship it" started touching actual servers.</div>
    <div class="stat-grid" id="ssh-stats"></div>
    <div class="two-col">
      <div class="panel"><div class="chart-title">Servers That Had To Endure This ${infoIcon('Host counts are derived from SSH-style remote command events grouped by target host label.')}</div><div class="chart-subtitle">Remote command volume by host.</div><div id="chart-ssh-hosts"></div></div>
      <div class="panel"><div class="chart-title">When It Happened ${infoIcon('Timeline rows aggregate remote command events by day, showing top host and summarized activity.')}</div><div class="chart-subtitle">A short timeline of concentrated remote activity.</div><table class="data-table"><thead><tr><th>Date</th><th>Cmds</th><th>Host</th><th>Activity</th></tr></thead><tbody id="tbl-ssh-timeline"></tbody></table></div>
    </div>
    ${botNote(notes.remote)}
  </div>

  <div class="section">
    <div class="section-header"><span class="section-num">03</span><span class="section-title" style="color:var(--accent)">Risky Commands, Counted Properly</span></div>
    <div class="section-desc">The point is not that every flagged command is catastrophic. The point is that the pattern is visible once you actually track it.</div>
    <div class="stat-grid" id="cmd-stats"></div>
    <div class="two-col">
      <div class="panel"><div class="chart-title">Severity Distribution ${infoIcon('Counts come from command classification rules that bucket flagged shell commands into critical, high, medium, and low.')}</div><div class="chart-subtitle">Where the command volume sits across risk levels.</div><div id="chart-severity"></div></div>
      <div class="panel"><div class="chart-title">What The Risk Looked Like ${infoIcon('Categories summarize recurring flagged command types such as curl POST, git, filesystem, database, or infra operations.')}</div><div class="chart-subtitle">Types of operations that kept recurring.</div><div id="chart-categories"></div></div>
    </div>
    <div class="two-col" style="margin-top:16px">
      <div class="panel"><div class="chart-title" style="color:var(--red)">Findings Worth Calling Out ${infoIcon('This table lists the highest-signal flagged command patterns and their assigned risk levels.')}</div><div class="chart-subtitle">Low count does not mean low importance.</div><table class="data-table"><thead><tr><th>Type</th><th>Count</th><th>Risk</th></tr></thead><tbody id="tbl-findings"></tbody></table></div>
      <div class="panel"><div class="chart-title">Git Safety ${infoIcon('These counters track direct git behaviors that usually matter most for guardrails: push-to-main, force push, reset --hard, and --no-verify.')}</div><div class="chart-subtitle">Some guardrails existed. Not enough, but some.</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px" id="git-safety"></div></div>
    </div>
    ${botNote(notes.commands)}
  </div>

  <div class="section">
    <div class="section-header"><span class="section-num">04</span><span class="section-title" style="color:var(--accent)">Permission Discipline, Or Lack Of It</span></div>
    <div class="section-desc">Permission mode is one of the clearest signals in the dataset. You do not need prompts or code to see when a workflow is running with too little friction.</div>
    <div class="two-col" style="margin-bottom:16px">
      <div class="panel"><div class="chart-title">How Often Guardrails Were Bypassed ${infoIcon('Shares are derived from prompt counts by permission mode across the full analyzed period.')}</div><div class="chart-subtitle">Distribution across permission modes.</div><div style="display:flex;align-items:center;gap:20px;margin-top:8px"><div id="perm-legend" class="perm-legend" style="flex:0 0 auto"></div><div id="chart-perm-donut" style="max-width:240px;flex:1"></div></div></div>
      <div class="panel"><div class="chart-title">Prompts by Hour ${infoIcon('Hourly bars aggregate prompt counts and split them by permission mode to show when bypass usage clusters.')}</div><div class="chart-subtitle">When bypass-heavy behavior clusters during the day.</div><div id="chart-bypass-heat"></div></div>
    </div>
    <div class="panel"><div class="chart-title">Bypass vs Non-Bypass by Day ${infoIcon('Daily percentages are calculated from bypass prompts versus all other prompt modes for each date.')}</div><div class="chart-subtitle">A timeline view of how often oversight disappeared.</div><div id="chart-day-modes"></div></div>
    <div class="panel" style="margin-top:16px"><div class="chart-title" style="color:var(--red)">Projects Running Hottest ${infoIcon('Projects are ranked by bypass percentage with risk bands assigned from the resulting rate and prompt volume.')}</div><div class="chart-subtitle">The projects with the weakest permission discipline.</div><table class="data-table"><thead><tr><th>Project</th><th>Bypass Rate</th><th>Prompts</th><th>Risk</th></tr></thead><tbody id="tbl-project-risk"></tbody></table></div>
    ${botNote(notes.permissions)}
  </div>

  <div class="section">
    <div class="section-header"><span class="section-num">05</span><span class="section-title" style="color:var(--purple)">Autonomous Agents In The Same Security Model</span></div>
    <div class="section-desc">Subagents make the workflow faster. They also multiply the blast radius when the parent session is already running loose.</div>
    <div class="stat-grid" id="agent-stats"></div>
    ${botNote(notes.agents)}
  </div>

  <div class="section">
    <div class="section-header"><span class="section-num">06</span><span class="section-title" style="color:var(--green)">Where Humans Still Stepped In</span></div>
    <div class="section-desc">Not every session was reckless. These are the places where a human added the friction the workflow was missing.</div>
    <div class="stat-grid" id="override-stats"></div>
    <div class="panel"><div class="chart-title">Most Rejected Tools ${infoIcon('Counts are based on explicit user denials grouped by tool family or action type.')}</div><div class="chart-subtitle">Which tool categories triggered the most hesitation.</div><div id="chart-rejected"></div></div>
    ${botNote(notes.overrides)}
  </div>

  <div class="section">
    <div class="section-header"><span class="section-num">07</span><span class="section-title" style="color:var(--accent)">What Users Actually Sounded Like</span></div>
    <div class="section-desc">Behavior is one layer. Language is another. This view shows whether the vibe around the workflow was confident, frustrated, or both.</div>
    <div class="stat-grid" id="sentiment-stats"></div>
    <div class="two-col">
      <div class="panel"><div class="chart-title" style="color:var(--green)">Positive Language ${infoIcon('Derived from detected positive sentiment terms in user prompts across the analyzed corpus.')}</div><div class="chart-subtitle">Words that show satisfaction, momentum, or approval.</div><div id="chart-positive-words"></div></div>
      <div class="panel"><div class="chart-title" style="color:var(--red)">Negative Language ${infoIcon('Derived from detected negative sentiment terms in user prompts across the analyzed corpus.')}</div><div class="chart-subtitle">Words that show friction, confusion, or frustration.</div><div id="chart-negative-words"></div></div>
    </div>
    <div class="panel"><div class="chart-title">Sentiment by Project ${infoIcon('Project rows compare counts of positive and negative sentiment terms found in prompts for each project.')}</div><div class="chart-subtitle">Some projects create cleaner workflows than others.</div>
      <table class="data-table"><thead><tr><th>Project</th><th style="color:var(--green)">Positive</th><th style="color:var(--red)">Negative</th><th>Total Prompts</th></tr></thead><tbody id="tbl-sentiment-projects"></tbody></table>
    </div>
    ${botNote(notes.sentiment)}
  </div>

  <div class="section">
    <div class="section-header"><span class="section-num">08</span><span class="section-title" style="color:var(--red)">Wall Of Shame</span></div>
    <div class="section-desc">The point of the report is not panic. It is visibility. Once the pattern is obvious, you can decide what to tighten.</div>
    <div class="panel" style="margin-bottom:16px" id="risk-items"></div>
    <div class="panel"><div class="chart-title">What Was Still Under Control ${infoIcon('These are the notable absence-of-failure signals or lower-risk patterns detected in the same dataset.')}</div><div style="font-size:13px;color:var(--text-sec);line-height:2;margin-top:4px" id="working-well"></div></div>
    ${botNote(notes.risks)}
  </div>
  <div class="footer"><a href="https://vibenalytics.com">vibenalytics.com</a></div>
  `;

      gauge('#gauge-secrets', data.scores.secrets, 'Secrets', `${data.secret_exposure.total_secrets} exposed`, 120);
      gauge('#gauge-remote', data.scores.remote_access, 'Remote', `${data.ssh_remote_access.ssh_commands} ssh cmds`, 120);
      gauge('#gauge-overall', data.scores.overall, 'Overall', 'security score', 180);
      gauge('#gauge-permissions', data.scores.permissions, 'Permissions', `${Math.round(data.permission_discipline.bypass_pct)}% bypass`, 120);
      gauge('#gauge-commands', data.scores.commands, 'Commands', `${data.destructive_commands.critical} critical`, 120);

      document.getElementById('secret-stats').innerHTML = [
        statCard(data.secret_exposure.total_secrets, 'Secrets Exposed', 'Credential values visible in transcripts', 'var(--red)', 'Count of detected secret values found in transcript-derived findings across all projects.'),
        statCard(data.secret_exposure.sensitive_reads, 'Sensitive Reads', 'Reads of secret-bearing files', 'var(--red)', 'Number of reads against files classified as likely containing secrets, such as environment or credential files.'),
        statCard(data.secret_exposure.env_writes, '.env Writes', 'Edits to environment files', 'var(--accent)', 'Number of write events targeting environment files such as .env variants.'),
        statCard(data.secret_exposure.env_paths, '.env Paths', 'Unique env files touched', 'var(--blue)', 'Unique environment-file paths observed in the analyzed dataset.')
      ].join('');

      document.getElementById('ssh-stats').innerHTML = [
        statCard(data.ssh_remote_access.ssh_commands, 'SSH Commands', 'Remote executions total', 'var(--red)', 'Total SSH-related command events detected in the transcripts.'),
        statCard(data.ssh_remote_access.remote_command_ssh, 'Remote Command Style', 'Single-command ssh usage', 'var(--red)', 'Subset of SSH usage that executed one-off remote commands like ssh host "cmd".'),
        statCard(data.ssh_remote_access.unique_hosts, 'Unique Hosts', 'Distinct servers touched', 'var(--blue)', 'Distinct host labels extracted from SSH-related events.'),
        statCard(data.ssh_remote_access.interactive_ssh, 'Interactive SSH', 'Full shell sessions', 'var(--blue)', 'SSH events classified as interactive sessions rather than one-off remote commands.')
      ].join('');

      document.getElementById('cmd-stats').innerHTML = [
        statCard(data.destructive_commands.critical, 'Critical', 'Commands with obvious blast radius', 'var(--red)', 'Flagged commands matching the highest-risk rules, such as irreversible deletes or unsafe remote installers.'),
        statCard(data.destructive_commands.high, 'High', 'Risky mutations and weak safeguards', 'var(--accent)', 'Commands matching high-risk rules like direct main-branch pushes, filesystem destruction, or reset-style operations.'),
        statCard(data.destructive_commands.medium, 'Medium', 'Operations worth watching', 'var(--blue)', 'Commands that are not automatically catastrophic but still represent meaningful operational risk.'),
        statCard(data.destructive_commands.low, 'Low', 'Lower-signal but still flagged', 'var(--text-muted)', 'Commands that trip lower-confidence risk heuristics and are kept for pattern visibility.')
      ].join('');

      document.getElementById('agent-stats').innerHTML = [
        statCard(data.autonomous_agents.agents_spawned, 'Agents Spawned', 'Autonomous agents launched', 'var(--purple)', 'Total subagent or autonomous-agent launches detected in the event stream.'),
        statCard(data.autonomous_agents.in_bypass_mode, 'In Bypass Mode', 'Agents spawned without checks', 'var(--red)', 'Agent launches that occurred while the parent workflow was running in bypass mode.'),
        statCard(data.autonomous_agents.from_top_project.count, `From ${data.autonomous_agents.from_top_project.project}`, 'Most concentrated source', 'var(--accent)', 'Agent launches attributed to the single project with the highest volume.'),
        statCard(data.autonomous_agents.rejections, 'Rejections', 'Spawn attempts blocked by user', 'var(--green)', 'User actions that explicitly denied or blocked agent spawning.')
      ].join('');

      document.getElementById('override-stats').innerHTML = [
        statCard(data.human_overrides.denials, 'Denials', 'Explicit tool rejections', 'var(--green)', 'Count of tool requests that were explicitly denied by the user.'),
        statCard(data.human_overrides.interrupts, 'Interrupts', 'Responses stopped mid-run', 'var(--green)', 'Count of user interruptions that stopped an in-progress response or action.'),
        statCard(data.human_overrides.destructive_catches, 'Dangerous Catches', 'Interruptions during risky ops', 'var(--green)', 'Subset of interventions that happened during commands classified as risky or destructive.'),
        statCard(`${Math.round(data.human_overrides.override_rate)}%`, 'Override Rate', 'Human interventions per prompt', 'var(--blue)', 'Denials plus interrupts divided by total analyzed prompts.')
      ].join('');

      hbar('#chart-secret-types', arr(data.secret_exposure.secret_types).map(d => ({ l: d.label, v: d.count, c: d.label.includes('SECRET') || d.label.includes('KEY') ? C.red : C.accent })), 120);
      hbar('#chart-ssh-hosts', arr(data.ssh_remote_access.hosts_accessed).map((d, i) => ({ l: d.label, v: d.count, c: i < 2 ? C.red : C.accent })), 140);
      hbar('#chart-categories', arr(data.destructive_commands.by_category).map((d, i) => ({ l: d.label, v: d.count, c: i === 0 ? C.blue : i < 3 ? C.accent : C.red })), 120);
      hbar('#chart-rejected', arr(data.human_overrides.most_rejected_tools).map((d, i) => ({ l: d.label, v: d.count, c: i === 0 ? C.green : i === 1 ? C.green : C.blue })), 110);

      const sent = data.user_sentiment;
      const posNegRatio = sent.total_negative > 0 ? Math.round(sent.total_positive / sent.total_negative) : sent.total_positive;
      document.getElementById('sentiment-stats').innerHTML = [
        statCard(sent.total_positive, 'Positive Words', `${sent.positive_rate}% of prompts`, 'var(--green)', 'Total matched positive sentiment terms across analyzed prompts.'),
        statCard(sent.total_negative, 'Negative Words', `${sent.negative_rate}% of prompts`, 'var(--red)', 'Total matched negative sentiment terms across analyzed prompts.'),
        statCard(`${posNegRatio}:1`, 'Positive : Negative', 'Ratio', 'var(--green)', 'Ratio of positive sentiment term matches to negative sentiment term matches.'),
        statCard(sent.prompt_total, 'Total Prompts', 'Included in sentiment pass', 'var(--blue)', 'Number of prompts included in the sentiment analysis pass.'),
      ].join('');
      hbar('#chart-positive-words', arr(sent.top_positive).map((d, i) => ({ l: d.label, v: d.count, c: i < 3 ? C.green : C.blue })), 110);
      hbar('#chart-negative-words', arr(sent.top_negative).map((d, i) => ({ l: d.label, v: d.count, c: i === 0 ? C.red : C.accent })), 110);
      document.getElementById('tbl-sentiment-projects').innerHTML = arr(sent.by_project).map(r => `<tr><td class="mono">${r.project}</td><td class="mono" style="color:var(--green)">${r.positive}</td><td class="mono" style="color:var(--red)">${r.negative}</td><td class="mono">${r.total_prompts}</td></tr>`).join('');

      severityStack('#chart-severity', [
        { n: 'Critical', v: data.destructive_commands.critical, c: C.red },
        { n: 'High', v: data.destructive_commands.high, c: C.accent },
        { n: 'Medium', v: data.destructive_commands.medium, c: C.blue },
        { n: 'Low', v: data.destructive_commands.low, c: C.muted }
      ]);
      donut('#chart-perm-donut', arr(data.permission_discipline.mode_distribution).map((d, i) => ({ l: d.label, v: d.count, c: [C.red, C.accent, C.green, C.purple][i % 4] })), data.permission_discipline.prompt_total, `${Math.round(data.permission_discipline.bypass_pct)}%`);
      hourBars('#chart-bypass-heat', arr(data.permission_discipline.modes_by_hour));
      dayBars('#chart-day-modes', arr(data.permission_discipline.modes_by_day));
      document.getElementById('perm-legend').innerHTML = arr(data.permission_discipline.mode_distribution).map((d, i) => {
        const color = [C.red, C.accent, C.green, C.purple][i % 4];
        const pct = data.permission_discipline.prompt_total ? Math.round((d.count / data.permission_discipline.prompt_total) * 100) : 0;
        return `<div class="perm-legend-item"><span class="perm-legend-dot" style="background:${color}"></span><div><div class="perm-legend-label">${d.label}</div><div class="perm-legend-meta">${d.count} · ${pct}%</div></div></div>`;
      }).join('');

      document.getElementById('tbl-most-exposed').innerHTML = arr(data.secret_exposure.most_exposed).map(r => `<tr><td>${r.secret}</td><td class="mono">${r.hits}</td><td class="mono">${r.projects}</td></tr>`).join('');
      document.getElementById('tbl-ssh-timeline').innerHTML = arr(data.ssh_remote_access.timeline).map(r => `<tr><td class="mono">${r.date}</td><td class="mono">${r.commands}</td><td class="mono">${r.top_host}</td><td>${r.activity_summary}</td></tr>`).join('');
      document.getElementById('tbl-findings').innerHTML = arr(data.destructive_commands.critical_findings).map(r => `<tr><td>${r.kind}</td><td class="mono">${r.count}</td><td><span class="badge ${r.risk === 'CRITICAL' ? 'badge-p0' : 'badge-p1'}">${r.risk}</span></td></tr>`).join('');
      document.getElementById('tbl-project-risk').innerHTML = arr(data.permission_discipline.highest_bypass_projects).map(r => `<tr><td class="mono">${r.project}</td><td class="mono">${r.bypass_pct}%</td><td class="mono">${r.prompts}</td><td><span class="badge ${r.risk === 'CRITICAL' ? 'badge-p0' : r.risk === 'HIGH' ? 'badge-p1' : 'badge-p2'}">${r.risk}</span></td></tr>`).join('');
      document.getElementById('risk-items').innerHTML = arr(data.prioritized_risks.items).map(r => `<div class="risk-item"><span class="badge ${riskBadge(r.priority)}">${r.priority}</span><p><strong>${r.title}</strong> — ${r.description}</p></div>`).join('');
      document.getElementById('working-well').innerHTML = arr(data.prioritized_risks.whats_working_well).map(t => `<div>${t}</div>`).join('');

      const git = data.destructive_commands.git_safety;
      document.getElementById('git-safety').innerHTML = [
        ['Push to main', git.push_to_main, 'var(--accent)'],
        ['Force push', git.force_push, 'var(--green)'],
        ['reset --hard', git.reset_hard, 'var(--green)'],
        ['--no-verify', git.no_verify, 'var(--green)']
      ].map(([label, value, color]) => `<div style="background:var(--elevated);border:1px solid var(--border-subtle);border-radius:6px;padding:12px;text-align:center"><div style="font-family:'JetBrains Mono',monospace;font-size:20px;font-weight:600;color:${color}">${value}</div><div style="font-size:11px;color:var(--text-sec);margin-top:4px">${label}</div></div>`).join('');

      const projData = arr(data.secret_exposure.exposure_by_project).slice(0, 8);
      (function () {
        const m = { top: 8, right: 20, bottom: 28, left: 160 }, bh = 24, gap = 6, h = projData.length * (bh + gap) + m.top + m.bottom, w = 700;
        const svg = d3.select('#chart-project-exposure').html('').append('svg').attr('viewBox', `0 0 ${w} ${h}`);
        const x = d3.scaleLinear().domain([0, d3.max(projData, d => d.total) || 1]).range([0, w - m.left - m.right]);
        const g = svg.append('g').attr('transform', `translate(${m.left},${m.top})`);
        projData.forEach((d, i) => {
          const y = i * (bh + gap);
          const parts = [
            { k: 'reads', v: d.reads, c: C.blue, l: 'Reads' },
            { k: 'secrets', v: d.secrets, c: C.red, l: 'Secrets' },
            { k: 'writes', v: d.writes, c: C.accent, l: 'Writes' }
          ];
          let cx = 0;
          parts.forEach(p => {
            g.append('rect').attr('x', cx).attr('y', y).attr('width', x(p.v)).attr('height', bh).attr('fill', p.c).attr('opacity', 0.25)
              .on('mouseover', ev => showTip(ev, `<div>${d.project} / ${p.l}</div><div><strong>${p.v}</strong></div>`))
              .on('mouseout', hideTip);
            cx += x(p.v);
          });
          g.append('text').attr('x', -8).attr('y', y + bh / 2).attr('dy', '.35em').attr('text-anchor', 'end').attr('font-size', 11).attr('fill', C.sec).text(d.project);
        });
      })();
    }

    fetch(dataUrl)
      .then(r => { if (!r.ok) throw new Error(`Failed to load ${dataUrl}: ${r.status}`); return r.json(); })
      .then(render)
      .catch(err => {
        document.getElementById('app').innerHTML = `<div class="error">Failed to load report JSON.<br><br>${err.message}</div>`;
      });
  </script>
</body>

</html>
